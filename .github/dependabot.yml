version: 2
updates:
  # npm dependencies — group the dev tooling so it lands in one PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier*"
          - "typescript"
          - "tsx"
          - "@types/*"

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
