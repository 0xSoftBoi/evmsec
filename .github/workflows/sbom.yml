name: sbom

# Regenerate the CycloneDX SBOM and publish it as a release asset.
# A checked-in copy lives at sbom/evmsec.cdx.json; this keeps it fresh per
# release. All actions are pinned to a full commit SHA (see trailing comments).
# NOTE: runs once GitHub Actions billing is enabled for the org.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # attach the SBOM as a release asset

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Generate and attach CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom/evmsec.cdx.json
          artifact-name: evmsec.cdx.json
          # On a release event the SBOM is attached as a release asset;
          # on workflow_dispatch it is uploaded as a workflow artifact.
          upload-release-assets: true
