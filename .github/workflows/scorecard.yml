name: scorecard

# OpenSSF Scorecard — supply-chain security posture, written to the Security tab.
# All actions are pinned to a full commit SHA (see trailing comments).
# NOTE: activates once GitHub Actions billing is enabled for the org; until then
# this workflow is present and SHA-pinned but does not run. No README badge is
# published until there is a real Scorecard result to back it.

on:
  branch_protection_rule:
  schedule:
    - cron: '37 6 * * 1' # weekly, Mondays 06:37 UTC
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
