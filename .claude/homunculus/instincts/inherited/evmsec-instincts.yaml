# Evmsec Workflow Refactor Deduplicate Check Logic

## Action

Follow the refactor-deduplicate-check-logic workflow:
1. Identify duplicated logic across check files (e.g., selector scanning, verdict mapping, role resolution)
2. Extract shared logic into utility files (e.g., src/lib.ts, src/check.ts, src/checks/onchain.ts)
3. Update all affected check files to use the shared utilities
4. Ensure all tests pass and fixtures remain valid

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/checks/*.ts, src/lib.ts, src/check.ts

